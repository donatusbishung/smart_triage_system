services:
  db:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: node --watch server.js
    env_file:
      - backend/.env
    depends_on:
      - db

  frontend:
    build: 
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data: