server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip settings for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    location / {
        # Try to serve the exact file ($uri)
        # Then try to serve the file with .html appended ($uri.html)
        # Then try to serve a directory's index.html ($uri/index.html)
        # Optional: fallback to the root index.html for CSR single-page apps (but Next.js is pre-rendering routes)
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Cache static assets like _next/static indefinitely since they contain hashes
    location /_next/static/ {
        expires max;
        access_log off;
    }

    location /public/ {
        expires max;
        access_log off;
    }
}
